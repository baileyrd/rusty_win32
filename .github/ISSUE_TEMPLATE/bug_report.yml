name: Bug Report
description: Report something that's broken
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Also tell us what you expected to happen.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1.
        2.
        3.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version / commit
    validations:
      required: false
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or output
      description: No secrets/credentials — redact before pasting.
      render: shell
    validations:
      required: false
  - type: dropdown
    id: severity
    attributes:
      label: Severity
      options:
        - Low — cosmetic/minor
        - Medium — workaround exists
        - High — blocks work
        - Critical — data loss / security
    validations:
      required: true
