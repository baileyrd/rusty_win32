name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  # This crate's tests spawn real processes and open real console/pipe
  # handles — Windows handle *values* are small and get reused immediately
  # after CloseHandle, so running them across cargo test's default multiple
  # threads lets one test's handle get recycled mid-flight by an unrelated
  # test in another thread (observed as a sporadic ERROR_INVALID_HANDLE on
  # an otherwise-correct close/duplicate call). Serializing avoids the race
  # rather than chasing down which specific pair of tests collided this run.
  RUST_TEST_THREADS: "1"

jobs:
  windows:
    name: build & test (windows-latest)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.toml') }}

      - name: cargo fmt --check
        run: cargo fmt --check

      - name: cargo clippy (no default features)
        run: cargo clippy --all-targets -- -D warnings

      - name: cargo clippy (std feature)
        run: cargo clippy --all-targets --features std -- -D warnings

      - name: cargo test (no default features)
        run: cargo test

      - name: cargo test (std feature)
        run: cargo test --features std

  # Fast feedback without waiting on a windows-latest runner: this crate is
  # unusable off Windows by design, so there's nothing to *run* here, but a
  # cross-compile catches most compile errors in minutes instead of the
  # windows job's longer queue/boot time. The windows job above remains the
  # real gate — this is a pre-check, not a replacement (see the crate's
  # module docs and rush's docs/WINDOWS_BACKEND_ANALYSIS.md testing note:
  # this can't be meaningfully tested from a Linux sandbox).
  cross-compile-check:
    name: cross-compile check (mingw, Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-gnu
          components: clippy

      - name: Install mingw-w64
        run: sudo apt-get update && sudo apt-get install -y mingw-w64

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-mingw-${{ hashFiles('**/Cargo.toml') }}

      - name: cargo check --target x86_64-pc-windows-gnu (no default features)
        run: cargo check --target x86_64-pc-windows-gnu --all-targets

      - name: cargo check --target x86_64-pc-windows-gnu (std feature)
        run: cargo check --target x86_64-pc-windows-gnu --all-targets --features std

      - name: cargo clippy --target x86_64-pc-windows-gnu
        run: cargo clippy --target x86_64-pc-windows-gnu --all-targets --features std -- -D warnings

      - name: cargo test (host target — platform-neutral logic only, e.g. error.rs)
        run: cargo test --features std
